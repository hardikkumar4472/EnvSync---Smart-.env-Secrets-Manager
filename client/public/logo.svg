<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Shield Shape -->
  <path d="M250 50 L400 100 L400 250 C400 350 250 450 250 450 C250 450 100 350 100 250 L100 100 Z" 
        fill="none" 
        stroke="url(#grad1)" 
        stroke-width="15" 
        filter="url(#glow)" />
  
  <!-- Sync Arrows -->
  <g transform="translate(250, 230) scale(1.2)" filter="url(#glow)">
    <path d="M0 -60 A60 60 0 0 1 60 0 L80 0 L50 40 L20 0 L40 0 A40 40 0 0 0 -2.5 -31" fill="#06b6d4" />
    <path d="M0 60 A60 60 0 0 1 -60 0 L-80 0 L-50 -40 L-20 0 L-40 0 A40 40 0 0 0 2.5 31" fill="#a855f7" />
  </g>
  
  <!-- Circuit Lines -->
  <g stroke="white" stroke-width="2" opacity="0.3">
    <line x1="100" y1="150" x2="150" y2="150" />
    <circle cx="155" cy="150" r="3" fill="white" />
    <line x1="400" y1="200" x2="350" y2="200" />
    <circle cx="345" cy="200" r="3" fill="white" />
  </g>
</svg>
