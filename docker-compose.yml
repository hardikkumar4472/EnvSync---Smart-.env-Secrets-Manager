version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: envsync-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  server:
    build: ./server
    container_name: envsync-server
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/envsync}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - SECRET_MASTER_KEY=${SECRET_MASTER_KEY}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
    depends_on:
      - mongodb

  client:
    build:
      context: ./client
      args:
        - VITE_API_URL=/api
    container_name: envsync-client
    ports:
      - "80:80"
    depends_on:
      - server

  cli:
    build: ./cli
    image: envsync-cli
    container_name: envsync-cli
    volumes:
      - .:/app
    environment:
      - ENVSYNC_API_URL=http://server:4000/api
    profiles:
      - tools # Only runs when explicitly called

volumes:
  mongodb_data:
